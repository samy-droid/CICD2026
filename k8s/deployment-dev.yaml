apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app-dev
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-app
      env: dev
  template:
    metadata:
      labels:
        app: hello-app
        env: dev
    spec:
      containers:
        - name: hello-app
          image: DOCKER_HUB_USERNAME/hello-app:dev
          ports:
            - containerPort: 3000
          env:
            - name: APP_ENV
              value: dev
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: hello-app-dev
  namespace: dev
spec:
  selector:
    app: hello-app
    env: dev
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
